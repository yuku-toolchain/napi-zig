name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Bun on (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # bun has a known crash on windows; allow it to fail until upstream
    # fixes it, but keep the cell in the matrix so we notice when it does.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Comptime tests
        run: zig build test

      - name: Integration tests
        run: bun test

      - name: Build CLI
        run: bun run build:cli

  node-abi:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22, 24, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Smoke-test addon under Node
        run: node tests/smoke.mjs

  deno-abi:
    name: Deno on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # deno + windows currently fails with an opaque exit 1; we keep
    # building it pre-step so any zig issue surfaces here instead of
    # being swallowed inside smoke.mjs.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Pre-build fixture-lib
        run: cd tests/fixture-lib && zig build

      - name: Smoke-test addon under Deno
        run: deno run --allow-all tests/smoke.mjs --skip-build

  cross-compile:
    name: Cross-compile all platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Cross-compile fixture-cli for every target
        run: cd tests/fixture-cli && zig build -Dnpm=true --release=fast

      - name: Upload npm package directory
        uses: actions/upload-artifact@v4
        with:
          name: cross-compiled-pkg
          path: tests/fixture-cli/zig-out/npm/

  cross-install:
    name: Install + load on ${{ matrix.os }}
    needs: cross-compile
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download cross-compiled package
        uses: actions/download-artifact@v4
        with:
          name: cross-compiled-pkg
          path: pkg-out/

      - name: Load + smoke-test the binding for this platform
        run: node tests/installed-smoke.mjs pkg-out/fcli
