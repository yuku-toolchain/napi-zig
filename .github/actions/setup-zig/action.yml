name: Setup Zig
description: Install Zig (master) and restore the project's zig cache.

inputs:
  cache-suffix:
    description: Extra segment appended to the cache key. Use to isolate caches that should not share content (e.g. cross-compile).
    required: false
    default: default

runs:
  using: composite
  steps:
    - name: Install Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master
        cache-key: ${{ inputs.cache-suffix }}
